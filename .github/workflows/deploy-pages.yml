name: Build PDF

on:
  push:
    branches:
      - master
    paths:
      - '_chapters/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pandoc fonts-noto-cjk texlive-xetex texlive-lang-chinese

      - name: Build PDF
        run: |
          # Collect chapter markdown files in numeric order (front, main, back)
          chapters=$(find _chapters -name '*.md' | sort)

          # Preprocess markdown: convert Jekyll absolute image paths (/assets/...)
          # to relative paths (assets/...) so pandoc can resolve them from repo root
          tmpdir=$(mktemp -d)
          trap "rm -rf '$tmpdir'" EXIT
          processed=""
          i=0
          for f in $chapters; do
            outfile="$tmpdir/$(printf '%05d' $i).md"
            sed 's|/assets/|assets/|g' "$f" > "$outfile"
            processed="$processed $outfile"
            i=$((i + 1))
          done

          # Generate PDF — pandoc strips YAML front matter automatically
          pandoc $processed \
            -o easypeasy.pdf \
            --resource-path=. \
            -f markdown+smart \
            --toc \
            --toc-depth=2 \
            --number-sections \
            --metadata title="轻松戒色" \
            --metadata lang=zh-CN \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Sans CJK SC" \
            -V geometry="a4paper, margin=2cm"

      - name: Commit PDF to repository root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add easypeasy.pdf
          if ! git diff --staged --quiet; then
            git commit -m "chore: update easypeasy.pdf [skip ci]"
            git push
          fi
