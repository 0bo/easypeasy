name: Build and Deploy Chinese Book to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'translations/zh/**'
      - '.github/workflows/deploy-zh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pandoc fonts-noto-cjk

      - name: Build Chinese book
        working-directory: translations/zh
        run: |
          mkdir -p _book

          # Replace the `r Sys.Date()` placeholder with today's date
          TODAY=$(date +%Y-%m-%d)
          sed "s/\`r Sys\.Date()\`/${TODAY}/g" index.Rmd > /tmp/index_fixed.Rmd

          # Collect chapter files in numeric order
          chapters=$(printf '%s\n' [0-9]*.Rmd 2>/dev/null | sort)

          # Build the book as a single HTML page using Pandoc.
          # Pandoc handles Chinese anchor IDs natively, no post-processing needed.
          pandoc /tmp/index_fixed.Rmd $chapters \
            -o _book/index.html \
            -f markdown+smart \
            -s \
            --toc \
            --toc-depth=2 \
            --metadata title="轻松戒色" \
            --metadata lang=zh-CN \
            --css=style.css \
            --highlight-style=pygments

          # Copy static assets to the output directory.
          # Use -rL to dereference symlinks (images/ is a symlink in this directory).
          cp style.css _book/
          [ -e images ] && cp -rL images _book/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: translations/zh/_book
          publish_branch: gh-pages
          force_orphan: true
