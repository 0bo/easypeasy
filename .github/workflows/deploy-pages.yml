name: Build PDF

on:
  push:
    branches:
      - master
    paths:
      - '*.Rmd'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pandoc fonts-noto-cjk texlive-xetex texlive-lang-chinese

      - name: Build PDF
        run: |
          # Replace the `r Sys.Date()` placeholder with today's date
          TODAY=$(date +%Y-%m-%d)
          sed "s/\`r Sys\.Date()\`/${TODAY}/g" index.Rmd > /tmp/index_fixed.Rmd

          # Collect chapter files in numeric order
          chapters=$(printf '%s\n' [0-9]*.Rmd 2>/dev/null | sort)

          # Generate PDF with table of contents from all chapters.
          pandoc /tmp/index_fixed.Rmd $chapters \
            -o easypeasy.pdf \
            -f markdown+smart \
            --toc \
            --toc-depth=2 \
            --number-sections \
            --metadata title="轻松戒色" \
            --metadata lang=zh-CN \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Sans CJK SC" \
            -V geometry="a4paper, margin=2cm"

      - name: Commit PDF to repository root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add easypeasy.pdf
          if ! git diff --staged --quiet; then
            git commit -m "chore: update easypeasy.pdf [skip ci]"
            git push
          fi
