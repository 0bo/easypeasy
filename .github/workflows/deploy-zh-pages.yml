name: Build and Deploy Chinese Book to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'translations/zh/**'
      - '.github/workflows/deploy-zh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fonts-noto-cjk pandoc
          sudo fc-cache -fv

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('bookdown', 'rmarkdown', 'knitr'), repos='https://cran.rstudio.com/')"

      - name: Build Chinese gitbook
        working-directory: translations/zh
        run: |
          # Fix Unicode header IDs to prevent anchor-link glitches in HTML output.
          # This mirrors the logic in the root build.sh: each unnamed heading gets a
          # temporary ASCII placeholder ID before rendering, which is then substituted
          # back with the proper slugified Unicode ID in the generated HTML files.
          backtick='`'
          newline=$'\n'
          headerid="0"
          sedargs=""

          rmdfiles=$(ls -1 | grep -iE '\.rmd')
          while IFS= read -r rmdfile; do
            filecontent=$(cat "$rmdfile")
            newfilecontent=""
            while IFS= read -r fileline; do
              lineisheader="0"
              headerisnamed="0"
              headerisunnumbered="0"
              if [[ "${fileline:0:1}" == "#" ]]; then
                if grep -Po "^((#)|(##))( |\t).*$" <<< "$fileline" &>/dev/null; then
                  lineisheader="1"
                  if grep -Po "^((#)|(##))( |\t).*\{[ \t]{0,}#.*\}[ \t]{0,}$" <<< "$fileline" &>/dev/null; then
                    headerisnamed="1"
                  fi
                  if grep -Po "^((#)|(##))( |\t).*\{[ \t]{0,}-[ \t]{0,}[ \t]{0,}#.*\}[ \t]{0,}$" <<< "$fileline" &>/dev/null; then
                    headerisnamed="1"
                  fi
                  if grep -Po "^((#)|(##))( |\t).*\{[ \t]{0,}-[ \t]{0,}\}[ \t]{0,}$" <<< "$fileline" &>/dev/null; then
                    headerisunnumbered="1"
                  fi
                fi
              fi
              if [ "$lineisheader" = "1" ] && [ "$headerisnamed" = "0" ]; then
                headerunsignaled=$(sed -e "s/\{[ \t]\{0,\}-[ \t]\{0,\}\}[ \t]\{0,\}$//g" <<< "$fileline")
                sanitizedname=$(sed -e "s/^\(\(#\)\|\(##\)\)//g" \
                  -e "s/[#\\/?!.<>${backtick}',()&@%^\$~{}+=;:\"|\*\x00-\x1F]//g" \
                  -e "s/\[//g" -e "s/]//g" \
                  -e "s/^[ \t]\+//g" -e "s/[ \t]\+$//g" \
                  -e "s/[ \t]\+/-/g" -e "s/[-]\+/-/g" \
                  -e "s/[[:upper:]]*/\L&/g" <<< "$headerunsignaled")
                headerid=$((headerid + 1))
                if [ "$headerisunnumbered" = "0" ]; then
                  newheader="$headerunsignaled {#headerplaceholder${headerid}id}"
                else
                  newheader="$headerunsignaled {-#headerplaceholder${headerid}id}"
                fi
                newfilecontent+="$newheader$newline"
                sedargs+="-e s/headerplaceholder${headerid}id/${sanitizedname}/g "
              else
                newfilecontent+="$fileline$newline"
              fi
            done <<< "$filecontent"
            echo "$newfilecontent" > "$rmdfile"
          done <<< "$rmdfiles"

          Rscript -e "bookdown::render_book('index.Rmd', 'bookdown::gitbook')"

          shopt -s globstar
          for file in _book/**; do
            if [ -f "$file" ]; then
              sed -i $sedargs "$file"
              newfilename=$(sed $sedargs <<< "$file")
              mv "$file" "$newfilename" &>/dev/null
            fi
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: translations/zh/_book
          publish_branch: gh-pages
          force_orphan: true
